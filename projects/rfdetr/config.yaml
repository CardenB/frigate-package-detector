# RF-DETR project config. Consumed by convert_to_coco.py / train.py / export_onnx.py.

variant: nano              # nano | small | medium  (Nano = what you latency-probed)

# Resolution MUST be ÷32 for Nano (patch_size 16 × num_windows 2 = 32 — the
# installed rfdetr enforces this; the docs' "÷56" was the Base variant). 384 is
# ÷32, close to the probed 320 (so deployable-adjacent, not the 576 dead-end) and
# much faster to train. Frigate export width/height must equal this. Bump to 512/640
# for more small-package recall if hardware allows (slower).
resolution: 384

# ---- Dataset (LEAN, not full COCO — see convert_to_coco.py) -----------------
# Keep only the classes we track; package always kept; cap COCO replay per class.
keep_classes_from: security_classes   # in ../../configs/classes.yaml
cap_per_class: 1500
coco_data_dir: data                   # convert_to_coco.py writes here
# num_classes is len(keep_classes); written to data/classes.txt by the converter.
# [VERIFY] set num_classes explicitly in train (known rfdetr save bug, issue #407).

# ---- Fine-tune recipe (RF-DETR docs) ----------------------------------------
epochs: 100                # with early stopping; not 10 (demo). DINOv2 transfers fast
                           # but arch-aug regularization needs enough epochs on small data
lr: 0.0001                 # head; backbone gets a lower LR internally
batch_size: 8              # 5090/32GB; total batch = batch_size * grad_accum_steps
grad_accum_steps: 2        # -> effective batch 16
early_stopping: true
early_stopping_patience: 15
early_stopping_min_delta: 0.005
early_stopping_use_ema: true   # EMA generalizes better; export the EMA weights

output_dir: runs

export:
  format: onnx
  # size follows `resolution`.
